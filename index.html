<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MemBridge Gallery</title>
  <link rel="stylesheet" href="css/storyboard.css">
</head>
<body>
  <div id="app">
    <div id="status-bar">
      <span id="status-title">🏛️ MemBridge</span>
      <span id="status-info">Loading...</span>
    </div>

    <div id="wing-selector">
      <button class="wing-chip active" data-wing="morning">🌅 Morning</button>
      <button class="wing-chip" data-wing="afternoon">☀️ Afternoon</button>
      <button class="wing-chip" data-wing="evening">🌆 Evening</button>
      <button class="wing-chip" data-wing="night">🌙 Night</button>
      <button class="wing-chip" data-wing="people">👤 People</button>
      <button class="wing-chip" data-wing="places">📍 Places</button>
    </div>

    <div id="search-bar">
      <input type="text" id="search-input" placeholder="🔍 Search your palace...">
    </div>

    <div id="storyboard"></div>

    <div id="empty-state" style="display:none;">
      <div class="empty-icon">🏛️</div>
      <h2>Your palace is empty</h2>
      <p>Add photos or memories to begin</p>
      <input type="file" id="photo-input" accept="image/*" multiple style="display:none;">
      <button id="pick-photos-btn" class="btn-primary">📸 Add Photos</button>
      <button id="add-text-btn" class="btn-secondary" style="margin-top:12px;">✍️ Add Text Memory</button>
    </div>

    <div id="loading" style="display:none;">
      <div class="spinner"></div>
      <p>Building your memory palace...</p>
    </div>

    <!-- Add Text Memory Modal -->
    <div id="text-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:300;padding:20px;overflow-y:auto;">
      <div style="max-width:400px;margin:40px auto;">
        <h3 style="color:var(--text);margin-bottom:16px;">✍️ Add Text Memory</h3>
        <select id="text-wing" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);margin-bottom:8px;">
          <option value="morning">🌅 Morning</option>
          <option value="afternoon">☀️ Afternoon</option>
          <option value="evening">🌆 Evening</option>
          <option value="night">🌙 Night</option>
          <option value="people">👤 People</option>
          <option value="places">📍 Places</option>
          <option value="ideas">💡 Ideas</option>
        </select>
        <input type="text" id="text-room" placeholder="Room name" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);margin-bottom:8px;">
        <input type="text" id="text-title" placeholder="Title (optional)" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);margin-bottom:8px;">
        <textarea id="text-content" placeholder="What do you want to remember?" rows="4" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);margin-bottom:12px;font-family:inherit;"></textarea>
        <button id="text-save-btn" class="btn-primary" style="width:100%;margin-bottom:8px;">💾 Save Memory</button>
        <button id="text-cancel-btn" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/membridge-db.js"></script>
  <script src="js/storyboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
