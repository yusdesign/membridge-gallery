name: "🏛️ Build MemBridge Gallery APK"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Node 24"
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: "☕ Java 21"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: "🤖 Android SDK"
        uses: android-actions/setup-android@v3

      - name: "📥 Dependencies"
        run: npm install

      - name: "📁 Prepare www (Android)"
        run: |
          mkdir -p www
          cp index.html www/
          cp -r css www/
          cp -r js www/

      - name: "🌐 Prepare web demo"
        run: |
          mkdir -p web
          cp web.html web/index.html
          cp -r css web/
          cp -r js/membridge-web.js web/js/
          cp -r js/web-app.js web/js/
     
      - name: "📱 Add Android"
        run: npx cap add android

      - name: "🔧 Sync"
        run: npx cap sync android

      - name: "🔑 Decode Keystore"
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/membridge.keystore

      - name: "📋 Verify keystore location"
        run: |
          echo "=== Keystore file ==="
          ls -la android/membridge.keystore
          echo "=== Current dir ==="
          pwd
          echo "=== Android dir contents ==="
          ls -la android/

      - name: "🔐 Create keystore.properties"
        run: |
          cat > android/keystore.properties << EOF
          storeFile=membridge.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: "🔧 Configure signing in build.gradle"
        run: |
          cat >> android/app/build.gradle << 'EOF'

          def keystorePropertiesFile = rootProject.file("keystore.properties")
          def keystoreProperties = new Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              signingConfigs {
                  release {
                      if (keystorePropertiesFile.exists()) {
                          storeFile rootProject.file(keystoreProperties['storeFile'])
                          storePassword keystoreProperties['storePassword']
                          keyAlias keystoreProperties['keyAlias']
                          keyPassword keystoreProperties['keyPassword']
                      }
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: "📦 Build Release APK"
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: "📤 Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: membridge-gallery-release
          path: android/app/build/outputs/apk/release/app-release.apk
