name: "🏛️ Build MemBridge Gallery APK"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Node 24"
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: "☕ Java 21"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: "🤖 Android SDK"
        uses: android-actions/setup-android@v3

      - name: "📥 Dependencies"
        run: npm install

      - name: "📁 Prepare www"
        run: |
          mkdir -p www
          cp index.html www/
          cp -r css www/
          cp -r js www/

      - name: "📱 Add Android"
        run: npx cap add android

      - name: "🔧 Sync"
        run: npx cap sync android

      - name: "🔑 Decode Keystore"
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/membridge.keystore

      - name: "🔐 Create keystore.properties"
        run: |
          cat > android/keystore.properties << EOF
          storeFile=app/membridge.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: "📦 Build Release APK"
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: "📋 List APKs"
        if: always()
        run: |
          echo "=== Searching for APKs ==="
          find android -name "*.apk" 2>/dev/null || echo "No APKs found"
          echo "=== Build output directory ==="
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "No output directory"

      - name: "📤 Upload APK"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: membridge-gallery-release
          path: android/app/build/outputs/apk/release/app-release.apk
